<!DOCTYPE html>
<html>
<head>
    <title>German Drills</title>
</head>
<body>

<h2>Generador de Drills</h2>

<form action="/" method="post">
    <textarea name="content" rows="10" placeholder="Pega tus drills aquí..."></textarea>
    
    <div class="engine-selector">
        <label><strong>Motor de Voz:</strong></label>
        <input type="radio" id="edge" name="engine" value="edge" checked>
        <label for="edge">Microsoft (Edge-TTS - Natural)</label>
        
        <input type="radio" id="google" name="engine" value="google">
        <label for="google">Google (gTTS - Estándar)</label>
    </div>

    <button type="submit">Generar Audios</button>
    <a href="{{ url_for('generate', engine='edge') }}" class="btn">Generar 10 con IA (Microsoft)</a>
<a href="{{ url_for('generate', engine='google') }}" class="btn">Generar 10 con IA (Google)</a>


</form>

<hr>
<h2>Drills guardados</h2>

<table border="1" cellpadding="8">
    <tr>
        <th>Frase</th>
        <th>Audio</th>
    </tr>

    {% for drill in drills %}
    <tr>
        <td>{{ drill[1] }}</td>
        <td>
            <audio controls>
                <source src="/audio/{{ drill[2] }}" type="audio/mpeg">
            </audio>
        </td>
    </tr>
    {% endfor %}
</table>

<br>

<button onclick="window.location.href='/print'">🖨️ Vista impresión</button>
<button onclick="window.print()">🖨️ Imprimir directo</button>

<a href="/generate">
    <button type="button">⚡ Generar drills</button>
</a>

<button onclick="generateAI()">🧠 Generar con IA</button>

<script>
async function generateAI() {
    const res = await fetch("/generate_ai", {
        method: "POST"
    });

    const data = await res.json();

    location.reload(); // o render dinámico
}
</script>


<button onclick="generar()">Generar drills</button>

<div id="result"></div>

<script>
async function generar() {
    const res = await fetch("/generate_ai", {
        method: "POST"
    });

    const data = await res.json();

    let html = "";

    data.forEach(d => {
        html += `
            <p>${d.text}</p>
            <audio controls src="${d.audio}"></audio>
            <hr>
        `;
    });

    document.getElementById("result").innerHTML = html;
}
</script>





</body>
</html>
